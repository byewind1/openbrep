name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint GDL knowledge
        run: python knowledge/scripts/lint-knowledge.py knowledge

      - name: Smoke-test GDL knowledge context
        run: python scripts/knowledge_context_smoke.py --json

      - name: Run tests
        run: python -m pytest tests/ -q

  react-workbench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python
        run: python -m pip install -e ".[dev]"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run React Workbench readiness gate
        run: python scripts/workbench_readiness_gate.py --pretty

      - name: Run React Workbench browser smoke
        run: python scripts/workbench_browser_smoke.py --pretty

  scorecard-mock:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run mock scorecard
        run: python evals/scorecards/run_scorecard.py --mode mock --output evals/scorecards/results/
